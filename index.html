<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azraei · Senarai Semak Barang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f7fb;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            padding: 28px 24px 32px;
            transition: 0.2s;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #0b2b44;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .subhead {
            color: #3d5a73;
            font-size: 15px;
            border-left: 4px solid #2b7a62;
            padding-left: 14px;
            margin-bottom: 20px;
            background: #ecf3f0;
            border-radius: 0 20px 20px 0;
            line-height: 1.4;
            padding: 10px 16px;
            background: #f0f6f3;
        }
        .grid-wrap {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        /* kategori */
        .category {
            background: #fafcff;
            border-radius: 20px;
            padding: 6px 0 6px 0;
            border: 1px solid #e6edf4;
        }
        .category-title {
            font-weight: 600;
            font-size: 18px;
            color: #1a3e4c;
            background: #e3edf5;
            padding: 10px 20px;
            border-radius: 20px 20px 12px 12px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 8px 12px;
            padding: 8px 16px 16px 16px;
        }
        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px 6px 8px;
            border-radius: 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            border: 1px solid #eef3f8;
            transition: 0.1s ease;
        }
        .item:hover {
            background: #f2f9ff;
            border-color: #b8d1e5;
        }
        .item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1f7b5c;
            cursor: pointer;
            flex-shrink: 0;
        }
        .item label {
            font-size: 14px;
            font-weight: 450;
            color: #1a2e3f;
            cursor: pointer;
            word-break: break-word;
            line-height: 1.3;
            padding: 4px 0;
        }
        .code-badge {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #eaf0f6;
            padding: 0 8px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            color: #1b4b5e;
            letter-spacing: 0.2px;
            margin-right: 2px;
            white-space: nowrap;
        }
        .stat-area {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px 30px;
            background: #f6faff;
            padding: 18px 20px 20px;
            border-radius: 24px;
            border: 1px solid #dde8f0;
        }
        .progress-box {
            flex: 1 1 200px;
        }
        .progress-box p {
            font-weight: 500;
            color: #1f4357;
            margin-bottom: 6px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-bg {
            background: #dce5ed;
            height: 12px;
            border-radius: 40px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #1f7b5c;
            border-radius: 40px;
            transition: width 0.2s ease;
        }
        .chart-container {
            flex: 2 1 280px;
            min-width: 200px;
        }
        .chart-container h4 {
            font-size: 14px;
            font-weight: 500;
            color: #1f4357;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 70px;
            padding-top: 6px;
        }
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .bar {
            width: 100%;
            max-width: 28px;
            background: #1f7b5c;
            border-radius: 8px 8px 4px 4px;
            height: 10px;
            min-height: 4px;
            transition: height 0.2s;
            background: #328f6e;
        }
        .bar-label {
            font-size: 10px;
            color: #2b4a5a;
            margin-top: 4px;
            font-weight: 450;
        }
        .stats-note {
            font-size: 13px;
            color: #2b5a6b;
            background: #eaf1f9;
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 4px;
        }
        .footer {
            margin-top: 18px;
            color: #4d687a;
            font-size: 13px;
            border-top: 1px solid #dde6ef;
            padding-top: 18px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .reset-btn {
            background: none;
            border: 1px solid #bccddb;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #1f4a5e;
            cursor: pointer;
            background: white;
            transition: 0.15s;
        }
        .reset-btn:hover {
            background: #e2edf7;
            border-color: #789bb3;
        }
        @media (max-width: 550px) {
            .container { padding: 18px 12px; }
            .item-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <header style="display:flex; justify-content:space-between; flex-wrap:wrap; align-items:center;">
        <h1>📋 Azraei · Check List</h1>
        <span style="background:#eef4fa; padding:4px 16px; border-radius:40px; font-size:14px; color:#1b4b5e;">mingguan</span>
    </header>
    <div class="subhead">
        ✅ Semak setiap barang · pastikan lengkap — elakkan kehilangan
    </div>

    <div class="grid-wrap" id="categoryContainer">
        <!-- kategori akan dijana oleh js -->
    </div>

    <!-- stat & graf -->
    <div class="stat-area">
        <div class="progress-box">
            <p><span>✅ Kelengkapan</span> <span id="progressPercent">0%</span></p>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <div style="margin-top:8px; display:flex; gap:12px; flex-wrap:wrap;">
                <span style="font-size:14px; background:#e3edf5; padding:2px 16px; border-radius:30px;">✔️ <span id="checkedCount">0</span> / <span id="totalCount">0</span></span>
                <span style="font-size:14px; color:#3a5a6b;">📦 <span id="missingCount">0</span> belum</span>
            </div>
        </div>
        <div class="chart-container">
            <h4>📈 7 hari terakhir (simulasi)</h4>
            <div class="chart-bars" id="chartBars">
                <!-- 7 bar -->
            </div>
            <div style="display:flex; justify-content:space-between; font-size:11px; color:#2e5a6e; margin-top:2px;">
                <span>Is</span><span>Se</span><span>Ra</span><span>Kh</span><span>Ju</span><span>Sa</span><span>Ah</span>
            </div>
            <div style="margin-top:8px; font-size:13px; background:#e6f0f7; padding:4px 12px; border-radius:40px; display:inline-block;">
                ⏳ <span id="trendLabel">trend minggu ini</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>🧾 Senarai lengkap · Azraei</span>
        <button class="reset-btn" id="resetBtn">↻ Tetapkan semula semua</button>
    </div>
</div>
<script>
    (function() {
        // ----- DATA KATEGORI & BARANG (seperti diminta) -----
        const categories = [
            { name: "Hanger", items: [
                { code: "AZ01H", desc: "biru" }, { code: "AZ02H", desc: "biru" }, { code: "AZ03H", desc: "biru" },
                { code: "AZ04H", desc: "biru" }, { code: "AZ05H", desc: "biru" }, { code: "AZ06H", desc: "biru" },
                { code: "AZ07H", desc: "biru" }, { code: "AZ08H", desc: "biru" }, { code: "AZ09H", desc: "biru" },
                { code: "AZ10H", desc: "biru" }, { code: "AZ11H", desc: "biru" }, { code: "AZ12H", desc: "biru" }
            ]},
            { name: "Stokin", items: [
                { code: "AZ01ST", desc: "Putih" }, { code: "AZ02ST", desc: "Kelabu" },
                { code: "AZ03ST", desc: "Kelabu gelap" }, { code: "AZ04ST", desc: "Hitam" },
                { code: "AZ05ST", desc: "Hitam" }, { code: "AZ06ST", desc: "Kelabu tebal" }
            ]},
            { name: "Ampaian", items: [
                { code: "AZ01A", desc: "Penyepit" }, { code: "AZ02A", desc: "Penyepit" },
                { code: "AZ03A", desc: "Penyepit" }, { code: "AZ04A", desc: "Penyepit" },
                { code: "AZ05A", desc: "Penyepit" }, { code: "AZ06A", desc: "Penyepit" },
                { code: "AZ07A", desc: "Penyepit" }, { code: "AZ08A", desc: "Penyepit" },
                { code: "AZ09A", desc: "Penyepit" }, { code: "AZ10A", desc: "Penyepit" },
                { code: "AZ11A", desc: "Penyepit" }, { code: "AZ12A", desc: "Penyepit" },
                { code: "AZ13A", desc: "Penyepit" }, { code: "AZ14A", desc: "Penyepit" },
                { code: "AZ15A", desc: "Penyepit" }, { code: "AZ16A", desc: "Penyepit" },
                { code: "AZ17A", desc: "Penyepit" }, { code: "AZ18A", desc: "Penyepit" },
                { code: "AZ19A", desc: "Penyepit" }, { code: "AZ20A", desc: "Penyepit" },
                { code: "AZ21A", desc: "Ampaian" }
            ]},
            { name: "Mandian", items: [
                { code: "AZ01M", desc: "Syampu" }, { code: "AZ02M", desc: "Sabun" },
                { code: "AZ03M", desc: "Ubat gigi" }, { code: "AZ04M", desc: "Bekas sabun" },
                { code: "AZ05M", desc: "Pisau cukur" }, { code: "AZ06M", desc: "Pencuci muka" },
                { code: "AZ07M", desc: "Berus gigi" }
            ]},
            { name: "Storage", items: [
                { code: "AZ01S", desc: "Storage box" }
            ]},
            { name: "Kasut & Selipar", items: [
                { code: "AZ01KK", desc: "Kasut formal" }, { code: "AZ02KK", desc: "Kasut bot" },
                { code: "AZ03KK", desc: "Kasut sukan" }, { code: "AZ04KK", desc: "Selipar" }
            ]},
            { name: "Kemeja", items: [
                { code: "AZ01K", desc: "Putih" }, { code: "AZ02K", desc: "Biru gelap" },
                { code: "AZ03K", desc: "Kelabu" }, { code: "AZ04K", desc: "Hitam" },
                { code: "AZ05K", desc: "Kelabu campuran" }, { code: "AZ06K", desc: "Perak" }
            ]},
            { name: "Peralatan Makanan", items: [
                { code: "AZ01MA", desc: "Pinggan" }, { code: "AZ02MA", desc: "Mangkuk" },
                { code: "AZ03MA", desc: "Bekas" }, { code: "AZ04MA", desc: "Garfu" },
                { code: "AZ05MA", desc: "Sudu" }
            ]}
        ];

        // flatten untuk rujukan
        const allItems = [];
        categories.forEach(cat => {
            cat.items.forEach(it => {
                allItems.push({ ...it, category: cat.name });
            });
        });

        // ----- STATE: localStorage / in-memory -----
        let checkedState = {};

        function loadState() {
            const stored = localStorage.getItem('azraei_checklist');
            if (stored) {
                try {
                    checkedState = JSON.parse(stored);
                    // pastikan hanya kod yang wujud
                    const validCodes = new Set(allItems.map(i => i.code));
                    Object.keys(checkedState).forEach(key => {
                        if (!validCodes.has(key)) delete checkedState[key];
                    });
                } catch (e) { checkedState = {}; }
            }
            // default: semua false
            allItems.forEach(item => {
                if (!(item.code in checkedState)) {
                    checkedState[item.code] = false;
                }
            });
        }
        function saveState() {
            localStorage.setItem('azraei_checklist', JSON.stringify(checkedState));
        }

        // ----- Render UI -----
        const container = document.getElementById('categoryContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const checkedCountSpan = document.getElementById('checkedCount');
        const totalCountSpan = document.getElementById('totalCount');
        const missingCountSpan = document.getElementById('missingCount');
        const chartBars = document.getElementById('chartBars');
        const trendLabel = document.getElementById('trendLabel');

        function renderChecklist() {
            let html = '';
            categories.forEach(cat => {
                html += `<div class="category"><div class="category-title">📌 ${cat.name}</div><div class="item-grid">`;
                cat.items.forEach(item => {
                    const checked = checkedState[item.code] || false;
                    html += `
                        <div class="item">
                            <input type="checkbox" id="chk_${item.code}" data-code="${item.code}" ${checked ? 'checked' : ''}>
                            <label for="chk_${item.code}"><span class="code-badge">${item.code}</span> ${item.desc}</label>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;

            // pasang event listener pada checkbox
            document.querySelectorAll('.item input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', function(e) {
                    const code = this.dataset.code;
                    checkedState[code] = this.checked;
                    saveState();
                    updateStatsAndChart();
                });
            });

            updateStatsAndChart();
        }

        // ----- Statistik & graf -----
        function updateStatsAndChart() {
            const total = allItems.length;
            let checked = 0;
            allItems.forEach(it => {
                if (checkedState[it.code]) checked++;
            });
            const percent = total === 0 ? 0 : Math.round((checked / total) * 100);
            const missing = total - checked;

            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
            checkedCountSpan.textContent = checked;
            totalCountSpan.textContent = total;
            missingCountSpan.textContent = missing;

            // Graf 7 hari: simulasi data berdasarkan checked hari ini + variasi
            // kita gunakan data pseudo-history untuk visual
            const todayChecked = checked;
            // history: 7 hari (hari ini di hujung)
            const history = generateHistory(todayChecked, total);
            renderChart(history, total);

            // label trend
            const last = history[history.length-1] || 0;
            const first = history[0] || 0;
            let trendMsg = '';
            if (last > first) trendMsg = '📈 meningkat';
            else if (last < first) trendMsg = '📉 menurun';
            else trendMsg = '➖ stabil';
            trendLabel.textContent = trendMsg + ` (${last} item)`;
        }

        // hasilkan 7 nilai (simulasi) berdasarkan hari ini, dengan variasi rawak
        function generateHistory(today, total) {
            // kita mahu 7 hari: hari Isnin - Ahad (Ahad = today)
            // tapi kita just guna rawak berpandukan today
            const seed = today;
            const history = [];
            // buat 6 hari sebelumnya + hari ini
            for (let i = 0; i < 7; i++) {
                let val;
                if (i === 6) {
                    val = today;
                } else {
                    // variasi dalam ± 3, tapi jangan bawah 0 atau atas total
                    const offset = Math.floor(Math.random() * 7) - 3; // -3 .. 3
                    let base = Math.min(total, Math.max(0, today + offset - (6 - i)*2 )); // trend menurun sedikit kebelakang
                    base = Math.min(total, Math.max(0, base + Math.floor(Math.random() * 5) - 2));
                    val = Math.min(total, Math.max(0, base));
                }
                history.push(val);
            }
            return history;
        }

        function renderChart(history, total) {
            const maxVal = total;
            const barsHtml = history.map(val => {
                const heightPercent = maxVal === 0 ? 0 : Math.max(4, (val / maxVal) * 60); // skala 60px
                return `<div class="bar-item"><div class="bar" style="height:${heightPercent}px;"></div><div class="bar-label">${val}</div></div>`;
            }).join('');
            chartBars.innerHTML = barsHtml;
        }

        // ----- Reset -----
        function resetAll() {
            if (confirm('Tetapkan semula semua kotak? Semua tanda akan hilang.')) {
                allItems.forEach(item => {
                    checkedState[item.code] = false;
                });
                saveState();
                renderChecklist(); // refresh
            }
        }

        // ----- Init -----
        loadState();
        renderChecklist();

        document.getElementById('resetBtn').addEventListener('click', resetAll);

        // autosave on any change (tambahan)
        window.addEventListener('beforeunload', function() {
            saveState();
        });

        // patch: jika checkbox di luar render, kita update.
        // namun event listener dah ada.
    })();
</script>
</body>
</html>
